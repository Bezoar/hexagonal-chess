name: Deploy to GitHub Pages

# On every push to main: run the tests, then (only if they pass) publish to Pages.
# This deploys via the GitHub Actions Pages pipeline, so once this workflow first
# runs it sets the Pages source to "GitHub Actions" (superseding branch deploys).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run tests
        run: node --test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
