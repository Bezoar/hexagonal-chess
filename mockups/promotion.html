<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hexagonal Chess — Promotion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#121319;--bg-1:#171922;--panel:#1b1e28;--panel-edge:#2a2f3d;--tone-0:#333b47;--tone-1:#465264;--tone-2:#5b6a80;
--white:#f1e8d6;--white-edge:#3a3528;--black:#23262f;--black-edge:#aab3c4;--accent:#d9a441;--accent-soft:#e7c074;--capture:#e0685f;--move:#5fa8e0;--ink:#ece7dd;--ink-dim:#9aa3b0;--ink-faint:#6c7382}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:radial-gradient(120% 80% at 50% 0%,#1c1f2a 0%,var(--bg-0) 60%,#0d0e13 100%);color:var(--ink);font-family:"Hanken Grotesk",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.table{height:100vh;width:100vw;display:grid;grid-template-columns:226px 1fr 226px}
.gutter{display:flex;flex-direction:column;padding:22px 18px;gap:15px;background:linear-gradient(var(--bg-1),var(--bg-0));border-inline:1px solid #20232e}
.gutter.far{transform:rotate(180deg)}
.seat-head{display:flex;align-items:baseline;justify-content:space-between}.seat-name{font-family:"Fraunces",serif;font-weight:600;font-size:19px;letter-spacing:.04em}.seat-dot{font-size:10px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase}
.score-card{background:var(--panel);border:1px solid var(--panel-edge);border-radius:14px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}.score-num{font-family:"Fraunces",serif;font-size:38px;font-weight:600;line-height:1;color:var(--accent-soft)}.score-meta{text-align:right}.score-meta .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}.adv{font-size:13px;color:var(--ink-dim);margin-top:3px}
.status{border-radius:12px;padding:12px 14px;background:linear-gradient(180deg,#222838,#1a1e28);border:1px solid var(--accent);box-shadow:0 0 0 1px var(--accent) inset}.status .turn{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}.status .state{font-family:"Fraunces",serif;font-size:20px;font-weight:600;margin-top:4px;color:var(--accent-soft)}
.spacer{flex:1 1 auto}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--panel-edge);border-radius:11px;padding:11px 10px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}.btn .ic{font-size:14px;opacity:.85}.btn.ghost{background:transparent}.btn.danger{color:#e89a93;border-color:#4a2e2c}.btn.mute{grid-column:1 / -1;padding:7px 10px;font-size:11px;color:#e0685f;border-color:#4a2e2c;background:rgba(224,104,95,.07)}
.board-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:10px}
.board-wrap::before{content:"";position:absolute;inset:6px;border-radius:24px;background:radial-gradient(120% 120% at 50% 40%,#1a1d27 0%,#131520 70%,#0e0f17 100%);box-shadow:inset 0 1px 0 #2a2f3d,0 24px 60px -30px #000}
svg.board{position:relative;width:100%;height:100%;overflow:visible}
.cell{stroke:#10121a;stroke-width:1.1}.cell.t0{fill:var(--tone-0)}.cell.t1{fill:var(--tone-1)}.cell.t2{fill:var(--tone-2)}
.promo-cell{fill:none;stroke:var(--accent);stroke-width:5;stroke-linejoin:round}
.piece{font-family:"Segoe UI Symbol","Apple Symbols","Noto Sans Symbols2",sans-serif;font-size:43px;text-anchor:middle;dominant-baseline:central;paint-order:stroke}
.piece.w{fill:var(--white);stroke:var(--white-edge);stroke-width:1.1px}.piece.b{fill:var(--black);stroke:var(--black-edge);stroke-width:1.3px}
.scrim{position:absolute;inset:10px;border-radius:24px;background:rgba(9,10,15,.4)}
.promo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(22,24,32,.98);border:1px solid var(--panel-edge);border-radius:18px;box-shadow:0 30px 80px -30px #000,0 0 0 1px rgba(217,164,65,.2) inset;padding:16px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:12px}
.promo .ttl{font-family:"Fraunces",serif;font-size:16px;font-weight:600;letter-spacing:.03em;color:var(--accent-soft)}
.promo .opts{display:flex;gap:12px}
.promo .opt{width:76px;height:88px;border-radius:14px;background:linear-gradient(180deg,#222838,#191d27);border:1px solid #2c3346;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.promo .opt.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset,0 8px 24px -14px var(--accent)}
.promo .opt .g{font-family:"Segoe UI Symbol","Apple Symbols",sans-serif;font-size:44px;color:var(--white);line-height:1}
.promo .opt .n{font-size:10px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase}
</style></head>
<body>
<div class="table">
  <aside class="gutter near">
    <div class="seat-head"><span class="seat-name">White</span><span class="seat-dot">near · you</span></div>
    <div class="score-card"><div class="score-num">1½</div><div class="score-meta"><div class="lbl">Match</div><div class="adv">+5 material</div></div></div>
    <div class="status"><div class="turn">Promotion</div><div class="state">f11 — choose</div></div>
    <div class="spacer"></div>
    <div class="controls"><button class="btn ghost"><span class="ic">⚙</span>Settings</button><button class="btn ghost"><span class="ic">↩</span>History</button><button class="btn mute"><span class="ic">🔇</span>Mute</button></div>
  </aside>
  <div class="board-wrap">
    <svg class="board" id="board"></svg>
    <div class="scrim"></div>
    <div class="promo">
      <div class="ttl">Promote pawn · f11</div>
      <div class="opts">
        <div class="opt sel"><span class="g">♛</span><span class="n">Queen</span></div>
        <div class="opt"><span class="g">♜</span><span class="n">Rook</span></div>
        <div class="opt"><span class="g">♝</span><span class="n">Bishop</span></div>
        <div class="opt"><span class="g">♞</span><span class="n">Knight</span></div>
      </div>
    </div>
  </div>
  <aside class="gutter far">
    <div class="seat-head"><span class="seat-name">Black</span><span class="seat-dot">far seat</span></div>
    <div class="score-card"><div class="score-num">1½</div><div class="score-meta"><div class="lbl">Match</div><div class="adv">—</div></div></div>
    <div class="status" style="border-color:#2c3346;box-shadow:none"><div class="turn">Waiting</div><div class="state" style="color:var(--ink-dim)">Black</div></div>
    <div class="spacer"></div>
    <div class="controls"><button class="btn ghost"><span class="ic">⚙</span>Settings</button><button class="btn mute"><span class="ic">🔇</span>Mute</button></div>
  </aside>
</div>
<script type="module">
const SIZE=40,R3=Math.sqrt(3);const F=['a','b','c','d','e','f','g','h','i','k','l'];
const fi=f=>F.indexOf(f)-5,m0=x=>Math.min(0,x);const cube=(f,r)=>{const x=fi(f);const y=r-6-m0(x);return[x,y,-x-y];};
const cells=[];for(let x=-5;x<=5;x++)for(let y=-5;y<=5;y++){const z=-x-y;if(Math.abs(z)<=5)cells.push([x,y,z]);}
const px=x=>SIZE*1.5*x,py=(x,y)=>-SIZE*R3*(y+x/2),tn=(x,y)=>((x-y)%3+3)%3;
const xs=cells.map(c=>px(c[0])),ys=cells.map(c=>py(c[0],c[1])),pad=SIZE*1.15;
const svg=document.getElementById('board');
svg.setAttribute('viewBox',`${Math.min(...xs)-pad} ${Math.min(...ys)-pad} ${Math.max(...xs)-Math.min(...xs)+2*pad} ${Math.max(...ys)-Math.min(...ys)+2*pad}`);
const NS='http://www.w3.org/2000/svg',key=(x,y)=>x+','+y,ctr={};
const hp=(cx,cy,r=SIZE)=>{let p=[];for(let i=0;i<6;i++){const a=Math.PI/180*60*i;p.push(`${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`);}return p.join(' ');};
const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);svg.appendChild(e);return e;};
for(const[x,y]of cells){const cx=px(x),cy=py(x,y);ctr[key(x,y)]=[cx,cy];mk('polygon',{points:hp(cx,cy),class:'cell t'+tn(x,y)});}
const sq=s=>cube(s[0],parseInt(s.slice(1)));
const W={g1:'K',f11:'P',c4:'R',h6:'B',d2:'P',i2:'P',b1:'P'};
const B={g6:'K',a4:'R',l5:'P',k6:'P',i7:'P'};
{const c=sq('f11');const[cx,cy]=ctr[key(c[0],c[1])];mk('polygon',{points:hp(cx,cy,SIZE*0.84),class:'promo-cell'});}
const G={K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'};
const place=(m,c,far)=>{for(const s in m){const cu=sq(s);if(!(key(cu[0],cu[1])in ctr))continue;const[cx,cy]=ctr[key(cu[0],cu[1])];const t=mk('text',{x:cx,y:cy,class:'piece '+c});t.textContent=G[m[s]];if(far)t.setAttribute('transform',`rotate(180 ${cx} ${cy})`);}};
place(W,'w',false);place(B,'b',true);
</script>
</body></html>
