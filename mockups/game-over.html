<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hexagonal Chess — game-over state</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#121319; --bg-1:#171922; --panel:#1b1e28; --panel-edge:#2a2f3d;
  --tone-0:#333b47; --tone-1:#465264; --tone-2:#5b6a80;
  --white:#f1e8d6; --white-edge:#3a3528; --black:#23262f; --black-edge:#aab3c4;
  --accent:#d9a441; --accent-soft:#e7c074; --capture:#e0685f; --move:#5fa8e0;
  --ink:#ece7dd; --ink-dim:#9aa3b0; --ink-faint:#6c7382;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(120% 80% at 50% 0%, #1c1f2a 0%, var(--bg-0) 60%, #0d0e13 100%);
  color:var(--ink);font-family:"Hanken Grotesk",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.table{height:100vh;width:100vw;display:grid;grid-template-columns:226px 1fr 226px}
.gutter{display:flex;flex-direction:column;padding:22px 18px;gap:15px;
  background:linear-gradient(var(--bg-1),var(--bg-0));border-inline:1px solid #20232e}
.gutter.far{transform:rotate(180deg)}
.seat-head{display:flex;align-items:baseline;justify-content:space-between}
.seat-name{font-family:"Fraunces",serif;font-weight:600;font-size:19px;letter-spacing:.04em}
.seat-dot{font-size:10px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase}
.score-card{background:var(--panel);border:1px solid var(--panel-edge);border-radius:14px;
  padding:13px 15px;display:flex;align-items:center;justify-content:space-between}
.score-num{font-family:"Fraunces",serif;font-size:38px;font-weight:600;line-height:1;color:var(--accent-soft)}
.score-card.win{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.score-meta{text-align:right}
.score-meta .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
.adv{font-size:13px;color:var(--ink-dim);margin-top:3px}
.status{border-radius:12px;padding:12px 14px;background:linear-gradient(180deg,#222838,#1a1e28);border:1px solid #2c3346}
.status .turn{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}
.status .state{font-family:"Fraunces",serif;font-size:20px;font-weight:600;margin-top:4px}
.status.win{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.status.win .state{color:var(--accent-soft)}
.status.lose .state{color:#e89a93}
.spacer{flex:1 1 auto}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--panel-edge);
  border-radius:11px;padding:11px 10px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.btn .ic{font-size:14px;opacity:.85}
.btn.ghost{background:transparent}
.btn.danger{color:#e89a93;border-color:#4a2e2c}
.btn.mute{grid-column:1 / -1;padding:7px 10px;font-size:11px;color:#e0685f;border-color:#4a2e2c;background:rgba(224,104,95,.07)}
.board-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:10px}
.board-wrap::before{content:"";position:absolute;inset:6px;border-radius:24px;
  background:radial-gradient(120% 120% at 50% 40%,#1a1d27 0%,#131520 70%,#0e0f17 100%);
  box-shadow:inset 0 1px 0 #2a2f3d,0 24px 60px -30px #000}
svg.board{position:relative;width:100%;height:100%;overflow:visible}
.cell{stroke:#10121a;stroke-width:1.1}
.cell.t0{fill:var(--tone-0)} .cell.t1{fill:var(--tone-1)} .cell.t2{fill:var(--tone-2)}
.lastmove{fill:var(--accent);opacity:.15}
.check{fill:var(--capture);opacity:.26}
.checkstroke{fill:none;stroke:var(--capture);stroke-width:5;stroke-linejoin:round}
.piece{font-family:"Segoe UI Symbol","Apple Symbols","Noto Sans Symbols2",sans-serif;font-size:43px;
  text-anchor:middle;dominant-baseline:central;paint-order:stroke}
.piece.w{fill:var(--white);stroke:var(--white-edge);stroke-width:1.1px}
.piece.b{fill:var(--black);stroke:var(--black-edge);stroke-width:1.3px}
.piece.far{transform-box:fill-box;transform-origin:center;transform:rotate(180deg)}
.coord{fill:var(--ink-faint);font-size:9px;font-family:"Hanken Grotesk";opacity:.55}
.brand{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:"Fraunces",serif;
  font-size:12px;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-faint)}
/* frozen + end card */
.freeze{position:absolute;inset:10px;border-radius:24px;background:rgba(9,10,15,.5)}
.endcard{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:312px;
  background:rgba(20,22,30,.9);backdrop-filter:blur(7px);border:1px solid var(--panel-edge);border-radius:18px;
  box-shadow:0 30px 80px -28px #000,0 0 0 1px rgba(217,164,65,.20) inset;overflow:hidden}
.endhalf{padding:16px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:11px}
.endhalf.top{transform:rotate(180deg);border-bottom:1px solid var(--panel-edge)}
.kick{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.main{font-family:"Fraunces",serif;font-size:21px;font-weight:600;color:var(--accent-soft);text-align:center;line-height:1.1}
.endbtns{display:flex;gap:9px;margin-top:2px}
.endbtns .btn{padding:9px 15px}
.btn.primary{background:linear-gradient(180deg,#e0b25a,#c8923a);color:#241a08;border-color:#e7c074;font-weight:700}
</style>
</head>
<body>
<div class="table">
  <aside class="gutter near">
    <div class="seat-head"><span class="seat-name">White</span><span class="seat-dot">near seat</span></div>
    <div class="score-card win"><div class="score-num">2½</div>
      <div class="score-meta"><div class="lbl">Match</div><div class="adv">winner</div></div></div>
    <div class="status win"><div class="turn">Game over</div><div class="state">You win</div></div>
    <div class="spacer"></div>
    <div class="controls">
      <button class="btn ghost"><span class="ic">⚙</span>Settings</button>
      <button class="btn ghost"><span class="ic">↩</span>Review</button>
      <button class="btn mute"><span class="ic">🔇</span>Mute</button>
    </div>
  </aside>

  <div class="board-wrap">
    <div class="brand">Gliński · Hexagonal Chess</div>
    <svg class="board" id="board"></svg>
    <div class="freeze"></div>
    <div class="endcard">
      <div class="endhalf top">
        <div class="kick">Checkmate · White wins</div>
        <div class="main">White 2½ — 1½ Black</div>
        <div class="endbtns">
          <button class="btn primary">New Game</button>
          <button class="btn ghost">New Match</button>
        </div>
      </div>
      <div class="endhalf bottom">
        <div class="kick">Checkmate · White wins</div>
        <div class="main">White 2½ — 1½ Black</div>
        <div class="endbtns">
          <button class="btn primary">New Game</button>
          <button class="btn ghost">New Match</button>
        </div>
      </div>
    </div>
  </div>

  <aside class="gutter far">
    <div class="seat-head"><span class="seat-name">Black</span><span class="seat-dot">far seat</span></div>
    <div class="score-card"><div class="score-num">1½</div>
      <div class="score-meta"><div class="lbl">Match</div><div class="adv">—</div></div></div>
    <div class="status lose"><div class="turn">Game over</div><div class="state">Checkmated</div></div>
    <div class="spacer"></div>
    <div class="controls">
      <button class="btn ghost"><span class="ic">⚙</span>Settings</button>
      <button class="btn ghost"><span class="ic">↩</span>Review</button>
      <button class="btn mute"><span class="ic">🔇</span>Mute</button>
    </div>
  </aside>
</div>

<script type="module">
const SIZE=40, ROOT3=Math.sqrt(3);
const FILES=['a','b','c','d','e','f','g','h','i','k','l'];
const fileIndex=f=>FILES.indexOf(f)-5;
const min0=x=>Math.min(0,x);
const frToCube=(f,r)=>{const x=fileIndex(f);const y=r-6-min0(x);return [x,y,-x-y];};
const cells=[];
for(let x=-5;x<=5;x++)for(let y=-5;y<=5;y++){const z=-x-y;if(Math.abs(z)<=5)cells.push([x,y,z]);}
const px=x=>SIZE*1.5*x, py=(x,y)=>-SIZE*ROOT3*(y+x/2), tone=(x,y)=>((x-y)%3+3)%3;
const xs=cells.map(c=>px(c[0])), ys=cells.map(c=>py(c[0],c[1])), pad=SIZE*1.15;
const minX=Math.min(...xs)-pad,maxX=Math.max(...xs)+pad,minY=Math.min(...ys)-pad,maxY=Math.max(...ys)+pad;
const svg=document.getElementById('board');
svg.setAttribute('viewBox',`${minX} ${minY} ${maxX-minX} ${maxY-minY}`);
const NS='http://www.w3.org/2000/svg';
const hexPts=(cx,cy,rad=SIZE)=>{let p=[];for(let i=0;i<6;i++){const a=Math.PI/180*60*i;p.push(`${(cx+rad*Math.cos(a)).toFixed(2)},${(cy+rad*Math.sin(a)).toFixed(2)}`);}return p.join(' ');};
const key=(x,y)=>x+','+y, center={};
const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);svg.appendChild(e);return e;};
for(const [x,y] of cells){const cx=px(x),cy=py(x,y);center[key(x,y)]=[cx,cy];mk('polygon',{points:hexPts(cx,cy),class:'cell t'+tone(x,y)});}
const sqCube=sq=>frToCube(sq[0],parseInt(sq.slice(1)));
// illustrative final position
const W={g1:'K',f4:'Q',c1:'R',i6:'R',d4:'B',e7:'B',h3:'N',b1:'P',c2:'P',e3:'P',g3:'P',i2:'P',k1:'P'};
const B={g10:'K',e8:'Q',c8:'R',b7:'P',c7:'P',e6:'P',g7:'P',i7:'P',k7:'P',f9:'B'};
// last move trail (White i6->? ) illustrative e7 bishop delivered mate
for(const sq of ['d8','e7']){if(!(sqCube(sq)[0] in {}) ){const c=sqCube(sq);if(key(c[0],c[1])in center){const [cx,cy]=center[key(c[0],c[1])];mk('polygon',{points:hexPts(cx,cy),class:'lastmove'});}}}
for(const f of FILES){const x=fileIndex(f);let yMin=99;for(const[cx,cy]of cells)if(cx===x)yMin=Math.min(yMin,cy);
  const [sx,sy]=center[key(x,yMin)];mk('text',{x:sx,y:sy+SIZE*0.88,'text-anchor':'middle',class:'coord'}).textContent=f;}
// check highlight on mated Black king g10
{const c=sqCube('g10');const [cx,cy]=center[key(c[0],c[1])];
  mk('polygon',{points:hexPts(cx,cy),class:'check'});mk('polygon',{points:hexPts(cx,cy,SIZE*0.82),class:'checkstroke'});}
const GLYPH={K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'};
const place=(map,cls,far)=>{for(const sq in map){const c=sqCube(sq);const [cx,cy]=center[key(c[0],c[1])];
  mk('text',{x:cx,y:cy,class:'piece '+cls+(far?' far':'')}).textContent=GLYPH[map[sq]];}};
place(W,'w',false);place(B,'b',true);
</script>
</body>
</html>
