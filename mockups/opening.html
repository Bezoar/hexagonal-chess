<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hexagonal Chess — Opening (pre-first-move)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#121319;--bg-1:#171922;--panel:#1b1e28;--panel-edge:#2a2f3d;--tone-0:#333b47;--tone-1:#465264;--tone-2:#5b6a80;
--white:#f1e8d6;--white-edge:#3a3528;--accent:#d9a441;--accent-soft:#e7c074;--ink:#ece7dd;--ink-dim:#9aa3b0;--ink-faint:#6c7382}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:radial-gradient(120% 80% at 50% 0%,#1c1f2a 0%,var(--bg-0) 60%,#0d0e13 100%);color:var(--ink);font-family:"Hanken Grotesk",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.table{height:100vh;width:100vw;display:grid;grid-template-columns:226px 1fr 226px}
.gutter{display:flex;flex-direction:column;padding:22px 18px;gap:15px;background:linear-gradient(var(--bg-1),var(--bg-0));border-inline:1px solid #20232e}
.gutter.far{transform:rotate(180deg)}
.seat-head{display:flex;align-items:baseline;justify-content:space-between}.seat-name{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.04em}.seat-dot{font-size:10px;color:var(--ink-faint);letter-spacing:.16em;text-transform:uppercase}
.score-card{background:var(--panel);border:1px solid var(--panel-edge);border-radius:14px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}.score-num{font-family:"Fraunces",serif;font-size:38px;font-weight:600;line-height:1;color:var(--accent-soft)}.score-meta{text-align:right}.score-meta .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}.adv{font-size:13px;color:var(--ink-dim);margin-top:3px}
.status{border-radius:12px;padding:13px 14px;background:linear-gradient(180deg,#222838,#1a1e28);border:1px dashed var(--accent);box-shadow:0 0 0 1px rgba(217,164,65,.25) inset}
.status .turn{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-soft)}
.status .state{font-family:"Fraunces",serif;font-size:18px;font-weight:600;margin-top:4px;line-height:1.15}
.status .sub{font-size:11px;color:var(--ink-faint);margin-top:6px}
.spacer{flex:1 1 auto}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{font-size:12.5px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--panel-edge);border-radius:11px;padding:11px 10px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}.btn .ic{font-size:14px;opacity:.85}.btn.ghost{background:transparent}.btn.mute{grid-column:1 / -1;padding:7px 10px;font-size:11px;color:#e0685f;border-color:#4a2e2c;background:rgba(224,104,95,.07)}
.board-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:10px}
.board-wrap::before{content:"";position:absolute;inset:6px;border-radius:24px;background:radial-gradient(120% 120% at 50% 40%,#1a1d27 0%,#131520 70%,#0e0f17 100%);box-shadow:inset 0 1px 0 #2a2f3d,0 24px 60px -30px #000}
svg.board{position:relative;width:100%;height:100%;overflow:visible}
.cell{stroke:#10121a;stroke-width:1.1}.cell.t0{fill:var(--tone-0)}.cell.t1{fill:var(--tone-1)}.cell.t2{fill:var(--tone-2)}
.piece{font-family:"Segoe UI Symbol","Apple Symbols","Noto Sans Symbols2",sans-serif;font-size:43px;text-anchor:middle;dominant-baseline:central;paint-order:stroke;fill:var(--white);stroke:var(--white-edge);stroke-width:1.1px}
.coord{fill:var(--ink-faint);font-size:9px;opacity:.5}
.hint{position:absolute;left:50%;top:16px;transform:translateX(-50%);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-soft);background:rgba(20,22,30,.82);border:1px dashed var(--accent);border-radius:20px;padding:7px 16px}
.brand{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-family:"Fraunces",serif;font-size:12px;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-faint)}
</style></head>
<body>
<div class="table">
  <aside class="gutter near">
    <div class="seat-head"><span class="seat-name">Near seat</span><span class="seat-dot">you</span></div>
    <div class="score-card"><div class="score-num">0</div><div class="score-meta"><div class="lbl">Match</div><div class="adv">game 1</div></div></div>
    <div class="status"><div class="turn">New game</div><div class="state">Move to play White</div><div class="sub">First piece moved claims the White role.</div></div>
    <div class="spacer"></div>
    <div class="controls"><button class="btn ghost"><span class="ic">⚙</span>Settings</button><button class="btn ghost"><span class="ic">↻</span>New Match</button><button class="btn mute"><span class="ic">🔇</span>Mute</button></div>
  </aside>
  <div class="board-wrap">
    <svg class="board" id="board"></svg>
    <div class="hint">Either player may begin · first move claims White</div>
    <div class="brand">Gliński · Hexagonal Chess</div>
  </div>
  <aside class="gutter far">
    <div class="seat-head"><span class="seat-name">Far seat</span><span class="seat-dot">you</span></div>
    <div class="score-card"><div class="score-num">0</div><div class="score-meta"><div class="lbl">Match</div><div class="adv">game 1</div></div></div>
    <div class="status"><div class="turn">New game</div><div class="state">Move to play White</div><div class="sub">First piece moved claims the White role.</div></div>
    <div class="spacer"></div>
    <div class="controls"><button class="btn ghost"><span class="ic">⚙</span>Settings</button><button class="btn ghost"><span class="ic">↻</span>New Match</button><button class="btn mute"><span class="ic">🔇</span>Mute</button></div>
  </aside>
</div>
<script type="module">
const SIZE=40,R3=Math.sqrt(3);const F=['a','b','c','d','e','f','g','h','i','k','l'];
const fi=f=>F.indexOf(f)-5,m0=x=>Math.min(0,x);const cube=(f,r)=>{const x=fi(f);const y=r-6-m0(x);return[x,y,-x-y];};
const cells=[];for(let x=-5;x<=5;x++)for(let y=-5;y<=5;y++){const z=-x-y;if(Math.abs(z)<=5)cells.push([x,y,z]);}
const px=x=>SIZE*1.5*x,py=(x,y)=>-SIZE*R3*(y+x/2),tn=(x,y)=>((x-y)%3+3)%3;
const xs=cells.map(c=>px(c[0])),ys=cells.map(c=>py(c[0],c[1])),pad=SIZE*1.15;
const svg=document.getElementById('board');
svg.setAttribute('viewBox',`${Math.min(...xs)-pad} ${Math.min(...ys)-pad} ${Math.max(...xs)-Math.min(...xs)+2*pad} ${Math.max(...ys)-Math.min(...ys)+2*pad}`);
const NS='http://www.w3.org/2000/svg',key=(x,y)=>x+','+y,ctr={};
const hp=(cx,cy,r=SIZE)=>{let p=[];for(let i=0;i<6;i++){const a=Math.PI/180*60*i;p.push(`${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`);}return p.join(' ');};
const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);svg.appendChild(e);return e;};
for(const[x,y]of cells){const cx=px(x),cy=py(x,y);ctr[key(x,y)]=[cx,cy];mk('polygon',{points:hp(cx,cy),class:'cell t'+tn(x,y)});}
const sq=s=>cube(s[0],parseInt(s.slice(1)));
const near={g1:'K',e1:'Q',c1:'R',i1:'R',d1:'N',h1:'N',f1:'B',f2:'B',f3:'B',b1:'P',c2:'P',d3:'P',e4:'P',f5:'P',g4:'P',h3:'P',i2:'P',k1:'P'};
const far={g10:'K',e10:'Q',c8:'R',i8:'R',d9:'N',h9:'N',f9:'B',f10:'B',f11:'B',b7:'P',c7:'P',d7:'P',e7:'P',f7:'P',g7:'P',h7:'P',i7:'P',k7:'P'};
for(const f of F){const x=fi(f);let yMin=99;for(const[cx,cy]of cells)if(cx===x)yMin=Math.min(yMin,cy);const[sx,sy]=ctr[key(x,yMin)];mk('text',{x:sx,y:sy+SIZE*0.88,'text-anchor':'middle',class:'coord'}).textContent=f;}
const G={K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'};
const place=(m,far)=>{for(const s in m){const c=sq(s);const[cx,cy]=ctr[key(c[0],c[1])];const t=mk('text',{x:cx,y:cy,class:'piece'});t.textContent=G[m[s]];if(far)t.setAttribute('transform',`rotate(180 ${cx} ${cy})`);}};
place(near,false);place(far,true);
</script>
</body></html>
